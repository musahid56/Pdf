<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaano Zara - HD Videos</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 20px; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .search-area { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: white; outline: none; }
        .btn { background: var(--primary); border: none; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        #results { margin-top: 15px; }
        .v-card { background: #0f172a; border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid #334155; }
        video { width: 100%; display: block; }
        .dl-link { background: #22c55e; color: white; text-decoration: none; padding: 10px; display: block; text-align: center; font-weight: bold; }
        .loader { display: none; margin: 10px auto; border: 3px solid #334155; border-top: 3px solid var(--primary); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--primary)">HD VIDEOS</h1>
        <p style="color:#64748b; font-size:12px;">Search Anything (Nature, Love, Cars)</p>
    </div>

    <div class="container">
        <div class="search-area">
            <input type="text" id="query" placeholder="Type here...">
            <button class="btn" onclick="getVideos()">
                <span class="material-icons">search</span>
            </button>
        </div>
        <div class="loader" id="loader"></div>
        <div id="results"></div>
    </div>

    <script>
        async function getVideos() {
            const query = document.getElementById('query').value;
            const loader = document.getElementById('loader');
            const results = document.getElementById('results');

            if (!query) { alert("Pehle kuch likho toh sahi!"); return; }

            loader.style.display = 'block';
            results.innerHTML = '';

            try {
                // Pixabay API - Direct & 100% Working
                const apiKey = '44109726-21a47385be3d002e1b12b55f1';
                const url = `https://pixabay.com/api/videos/?key=${apiKey}&q=${encodeURIComponent(query)}&per_page=5`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                loader.style.display = 'none';

                if (data.hits && data.hits.length > 0) {
                    data.hits.forEach(v => {
                        const videoUrl = v.videos.medium.url;
                        results.innerHTML += `
                            <div class="v-card">
                                <video controls preload="none">
                                    <source src="${videoUrl}" type="video/mp4">
                                </video>
                                <a href="${videoUrl}" target="_blank" class="dl-link">DOWNLOAD VIDEO</a>
                            </div>`;
                    });
                } else {
                    alert("No videos found!");
                }
            } catch (err) {
                loader.style.display = 'none';
                alert("Error! Check internet.");
            }
        }
    </script>
</body>
</html>
